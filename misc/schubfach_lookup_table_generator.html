<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schubfach g-factor Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px 20px; background: #fdfdfd; color: #222; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h2 { font-weight: 400; margin-bottom: 5px; letter-spacing: -0.5px; }
        .info { font-size: 0.85em; color: #888; margin-bottom: 30px; font-family: monospace; }

        .panel { background: #fff; border: 1px solid #eee; border-radius: 6px; padding: 25px; margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: 600; }

        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #007bff; }

        .actions { display: flex; gap: 12px; border-top: 1px solid #f5f5f5; pt: 20px; padding-top: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; }
        button:hover { opacity: 0.85; }
        .btn-gen { background: #222; color: #fff; }
        .btn-copy { background: #28a745; color: #fff; }

        textarea { width: 100%; height: 500px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; padding: 20px; border: 1px solid #eee; border-radius: 6px; background: #fafafa; color: #444; box-sizing: border-box; resize: vertical; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Schubfach g-factor Generator</h2>
    <div class="info">g = floor(2^-r * 10^-k) + 1 | r = floor(log2(10^-k)) - 125</div>

    <div class="panel">
        <div class="grid">
            <div class="group">
                <label>Min k</label>
                <input type="number" id="minK" value="-308">
            </div>
            <div class="group">
                <label>Max k</label>
                <input type="number" id="maxK" value="324">
            </div>
            <div class="group">
                <label>Array Name</label>
                <input type="text" id="name" value="SchubfachTable">
            </div>
            <div class="group">
                <label>Struct Type</label>
                <input type="text" id="type" value="u128">
            </div>
        </div>

        <div class="actions">
            <button class="btn-gen" onclick="generateTable()">Generate Code</button>
            <button class="btn-copy" onclick="copyToClipboard()">Copy All</button>
        </div>
    </div>

    <textarea id="output" readonly placeholder="Resulting C++ source..."></textarea>
</div>

<script>
    async function copyToClipboard() {
        const output = document.getElementById('output');
        try {
            await navigator.clipboard.writeText(output.value);
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 2000);
        } catch (err) {
            output.select();
            document.execCommand('copy');
        }
    }

    function generateTable() {
        const minK = parseInt(document.getElementById('minK').value);
        const maxK = parseInt(document.getElementById('maxK').value);
        const output = document.getElementById('output');
        const type = document.getElementById('type').value;
        const name = document.getElementById('name').value;

        let cppCode = ``;
        cppCode += `// Range: k = ${minK} to ${maxK}\n`;
        cppCode += `// Index offset: ${Math.abs(minK)}\n`;
        cppCode += `static constexpr ${type} ${name}[] = {\n`;

        for (let k = minK; k <= maxK; k++) {
            let pow10 = 10n ** BigInt(Math.abs(k));
            let r = BigInt(Math.floor(Math.log2(10) * k)) - 125n;
            let g;

            if (k < 0) {
                g = (1n << -r) / pow10;
            } else {
                g = (1n << -r) * pow10;
            }

            g = g + 1n;

            let hex = g.toString(16).padStart(32, '0');
            let hi = "0x" + hex.substring(hex.length - 32, hex.length - 16).toUpperCase();
            let lo = "0x" + hex.substring(hex.length - 16).toUpperCase();

            cppCode += `    { ${hi}, ${lo} }, // k = ${k}\n`;
        }

        cppCode += `};\n`;
        output.value = cppCode;
    }

    function bigIntLog2(bn) {
        return BigInt(bn.toString(2).length - 1);
    }
</script>

</body>
</html>
