<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LSP Meta-Generator Pro + Seed Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 420px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        h3 { margin-top: 0; color: #fff; font-size: 11px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7;}
        .config-section { margin-bottom: 15px; background: #2d2d2d; padding: 10px; border-radius: 4px; border: 1px solid #333; }
        .config-group { display: flex; align-items: center; margin-bottom: 6px; justify-content: space-between; font-size: 11px; }
        .config-group input, .config-group select { background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 3px; width: 130px; border-radius: 2px; }

        #filter { background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 6px; width: 100%; box-sizing: border-box; margin-bottom: 8px; border-radius: 3px; font-size: 12px; }
        .list-box { flex-grow: 1; overflow-y: auto; border: 1px solid #333; background: #1a1a1a; border-radius: 4px; }
        .item { padding: 4px 8px; cursor: pointer; border-bottom: 1px solid #222; font-size: 11px; display: flex; align-items: center; }
        .item:hover { background: #2a2d2e; }
        .item.selected { background: #094771; color: #fff; }
        .item input { margin-right: 8px; pointer-events: none; }

        .content { flex-grow: 1; display: flex; flex-direction: column; background: #1e1e1e; position: relative;}
        .toolbar { padding: 8px 20px; background: #2d2d2d; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 10; }
        #output-container { flex-grow: 1; overflow: auto; background: #1e1e1e; }
        pre { margin: 0; padding: 20px; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.4; }
        code { background: transparent !important; padding: 0 !important; }

        #raw-output { position: absolute; left: -9999px; top: -9999px; }
        button { background: #0e639c; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 2px; font-size: 11px; }
        button:hover { background: #1177bb; }
        .status-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #444; color: #aaa; }
        .btn-mini { padding: 2px 6px; font-size: 10px; background: #444; margin-left: 5px;}
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Data Types</h3>
    <div class="config-section">
        <div class="config-group"><label>Namespace</label><input type="text" id="ns_name" value="Lsp::T"></div>
        <div class="config-group"><label>String View</label><input type="text" id="t_string" value="JsonString"></div>
    </div>

    <h3>Hash Router</h3>
    <div class="config-section">
        <div class="config-group">
            <label>Algorithm</label>
            <select id="h_algo" onchange="generateCode()">
                <option value="fnv1a">FNV-1a (32-bit)</option>
                <option value="djb2">DJB2 (Classic)</option>
                <option value="sdbm">SDBM (Linear)</option>
            </select>
        </div>
        <div class="config-group"><label>Table Size (2^n)</label><input type="number" id="h_size" value="256" step="2"></div>
        <div class="config-group">
            <label>Current Seed</label>
            <div>
                <input type="number" id="h_seed" value="0" style="width: 60px;">
                <button class="btn-mini" onclick="findSeed()">Find Perfect</button>
            </div>
        </div>
        <div class="config-group"><label>Status:</label><span id="hash_status" class="status-tag">Ready</span></div>
    </div>

    <h3>Switches</h3>
    <div class="config-section">
        <div class="config-group"><label>Schemas</label><input type="checkbox" id="sw_schema" checked onchange="generateCode()"></div>
        <div class="config-group"><label>Hash Enum/Router</label><input type="checkbox" id="sw_hash" checked onchange="generateCode()"></div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="font-size: 10px; margin-bottom: 8px;">
    <input type="text" id="filter" placeholder="Search structures..." oninput="renderList()">
    <div class="list-box" id="list"></div>
</div>

<div class="content">
    <div class="toolbar">
        <span id="stats" style="font-size: 11px; color: #777;">Load metaModel.json</span>
        <button onclick="copyToClipboard()">Copy Code</button>
    </div>
    <div id="output-container">
        <pre><code id="output" class="language-cpp"></code></pre>
    </div>
    <textarea id="raw-output"></textarea>
</div>

<script>
    let model = null;
    let selectedNodes = new Set();

    document.querySelectorAll('input').forEach(el => el.oninput = generateCode);

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            model = JSON.parse(reader.result);
            document.getElementById('stats').innerText = `${model.requests.length + model.notifications.length} methods found`;
            renderList(); findSeed();
        };
        reader.readAsText(e.target.files[0]);
    });

    const HashAlgos = {
        fnv1a: {
            init: 2166136261,
            calc: (h, c) => Math.imul(h ^ c, 16777619) >>> 0,
            cpp: `        uint32_t h = 2166136261U;\n        for (int i = 0; i < val.len; i++) {\n            h ^= (uint8_t)val.data[i];\n            h *= 16777619U;\n        }`
        },
        djb2: {
            init: 5381,
            calc: (h, c) => ((h << 5) + h + c) >>> 0,
            cpp: `        uint32_t h = 5381U;\n        for (int i = 0; i < val.len; i++) {\n            h = ((h << 5) + h) + (uint8_t)val.data[i];\n        }`
        },
        sdbm: {
            init: 0,
            calc: (h, c) => (c + (h << 6) + (h << 16) - h) >>> 0,
            cpp: `        uint32_t h = 0;\n        for (int i = 0; i < val.len; i++) {\n            h = (uint8_t)val.data[i] + (h << 6) + (h << 16) - h;\n        }`
        }
    };

    function calculateHash(str, algoKey, seed) {
        const algo = HashAlgos[algoKey];
        let h = algo.init >>> 0;
        for (let i = 0; i < str.length; i++) h = algo.calc(h, str.charCodeAt(i));
        return (h ^ (seed >>> 0)) >>> 0;
    }

    function findSeed() {
        if (!model) return;
        const algoKey = document.getElementById('h_algo').value;
        const tableSize = parseInt(document.getElementById('h_size').value);
        const methods = [...model.requests, ...model.notifications].map(m => m.method);
        const statusEl = document.getElementById('hash_status');

        statusEl.innerText = "Searching...";

        // Try random candidates
        setTimeout(() => {
            let foundSeed = null;
            // Try 20,000 random seeds
            for (let i = 0; i < 20000; i++) {
                let seed = Math.floor(Math.random() * 0xFFFFFFFF);
                let buckets = new Array(tableSize).fill(false);
                let collision = false;
                for (let m of methods) {
                    let idx = calculateHash(m, algoKey, seed) & (tableSize - 1);
                    if (buckets[idx]) { collision = true; break; }
                    buckets[idx] = true;
                }
                if (!collision) { foundSeed = seed; break; }
            }

            if (foundSeed !== null) {
                document.getElementById('h_seed').value = foundSeed;
                statusEl.innerText = "PERFECT"; statusEl.style.background = "#060";
            } else {
                statusEl.innerText = "COLLISION (Try larger size)"; statusEl.style.background = "#900";
            }
            generateCode();
        }, 10);
    }

    function toSnakeCase(str) {
        return str.replace(/([a-z])([A-Z])/g, '$1_$2').replace(/([A-Z])([A-Z][a-z])/g, '$1_$2').toUpperCase().replace(/[^A-Z0-9]/g, '_');
    }

    function renderList() {
        if (!model) return;
        const filter = document.getElementById('filter').value.toLowerCase();
        const container = document.getElementById('list');
        container.innerHTML = '';
        const items = [...model.structures, ...model.enumerations].sort((a,b)=>a.name.localeCompare(b.name));
        items.forEach(item => {
            if (item.name.toLowerCase().includes(filter)) {
                const div = document.createElement('div');
                div.className = `item ${selectedNodes.has(item.name) ? 'selected' : ''}`;
                div.innerHTML = `<input type="checkbox" ${selectedNodes.has(item.name)?'checked':''}>${item.name}`;
                div.onclick = () => toggleNode(item.name);
                container.appendChild(div);
            }
        });
    }

    function generateCode() {
        if (!model) return;
        const cfg = {
            string: document.getElementById('t_string').value,
            hSize: parseInt(document.getElementById('h_size').value),
            hSeed: parseInt(document.getElementById('h_seed').value),
            hAlgo: document.getElementById('h_algo').value,
            ns: document.getElementById('ns_name').value
        };
        const sw = { schema: document.getElementById('sw_schema').checked, hash: document.getElementById('sw_hash').checked };

        let code = `namespace ${cfg.ns} {\n\n`;

        if (sw.hash) {
            const methods = [...model.requests, ...model.notifications].map(m => m.method);

            code += `    enum RequestMethod {\n        RM_NONE = -1,\n`;
            methods.forEach(m => {
                const idx = calculateHash(m, cfg.hAlgo, cfg.hSeed) & (cfg.hSize - 1);
                code += `        RM_${toSnakeCase(m).padEnd(35)} = ${idx},\n`;
            });
            code += `    };\n\n`;

            code += `    static RequestMethod toRequestMethod(${cfg.string} val) {\n`;
            code += `        if (val.len == 0) return RM_NONE;\n`;
            code += HashAlgos[cfg.hAlgo].cpp + "\n";
            code += `        uint32_t index = (h ^ ${cfg.hSeed}U) & (${cfg.hSize - 1});\n`;
            code += `        switch (index) {\n`;
            methods.forEach(m => {
                const idx = calculateHash(m, cfg.hAlgo, cfg.hSeed) & (cfg.hSize - 1);
                code += `            case ${idx}: return (RequestMethod)${idx};\n`;
            });
            code += `            default: return RM_NONE;\n`;
            code += `        }\n    }\n\n`;
        }

        selectedNodes.forEach(name => {
            const s = model.structures.find(s => s.name === name);
            if (s) {
                code += `    struct ${s.name} {\n`;
                s.properties.forEach(p => code += `        void* ${p.name.padEnd(20)};\n`);
                code += `    };\n`;
                if (sw.schema) {
                    code += `    template<> struct Schema<${s.name}> { static constexpr auto fields = std::make_tuple(\n`;
                    code += s.properties.map(p => `        make_field("${p.name}", &${s.name}::${p.name})`).join(',\n') + `\n    ); };\n\n`;
                }
            }
        });

        code += `} // namespace ${cfg.ns}`;
        const out = document.getElementById('output');
        out.textContent = code;
        hljs.highlightElement(out);
        document.getElementById('raw-output').value = code;
    }

    function toggleNode(name) {
        if (selectedNodes.has(name)) selectedNodes.delete(name);
        else selectedNodes.add(name);
        renderList(); generateCode();
    }

    function selectAll(val) {
        if(!model) return;
        selectedNodes.clear();
        if(val) { model.structures.forEach(s => selectedNodes.add(s.name)); model.enumerations.forEach(e => selectedNodes.add(e.name)); }
        renderList(); generateCode();
    }

    function copyToClipboard() {
        const ta = document.getElementById('raw-output');
        ta.select();
        document.execCommand('copy');
    }
</script>

</body>
</html>
